<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pre-Med student voting system" />
    <meta name="theme-color" content="#1A3FA8" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PreMedElect" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <title>Pre-MedElect</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Self-heal: if the bundle 404s (stale cached HTML pointing at a removed
         hash), the React app never mounts. After a short grace period, wipe
         all SWs + caches and hard-reload so the user gets the live index.html. -->
    <script>
      (function () {
        var HEAL_TIMEOUT_MS = 6000;
        var HEAL_FLAG = 'premed_self_heal_attempted';
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount > 0) return; // app mounted, all good
          if (sessionStorage.getItem(HEAL_FLAG)) return;  // already tried this session
          sessionStorage.setItem(HEAL_FLAG, '1');
          console.warn('[self-heal] App did not mount; clearing caches and reloading.');
          var cleanup = Promise.resolve();
          if ('serviceWorker' in navigator) {
            cleanup = cleanup.then(function () {
              return navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              });
            });
          }
          if (window.caches) {
            cleanup = cleanup.then(function () {
              return caches.keys().then(function (names) {
                return Promise.all(names.map(function (n) { return caches.delete(n); }));
              });
            });
          }
          cleanup.finally(function () {
            location.reload();
          });
        }, HEAL_TIMEOUT_MS);
      })();
    </script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').then((registration) => {
            console.log('Service Worker registered:', registration);

            // If the SW asks us to reload (e.g., after activating a new version
            // with a fresh cache), comply.
            navigator.serviceWorker.addEventListener('message', (event) => {
              if (event.data && event.data.type === 'SW_FORCE_RELOAD') {
                location.reload();
              }
            });

            // Check for updates every hour
            setInterval(() => {
              registration.update();
            }, 60 * 60 * 1000);
          }).catch((error) => {
            console.log('Service Worker registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
